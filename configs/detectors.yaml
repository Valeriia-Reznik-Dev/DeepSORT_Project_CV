detector_eval:
  iou_threshold: 0.5
  output_dir: results/detectors
  max_frames: null  

detectors:
  yolo:
    model: yolov8n.pt
    conf_threshold: 0.3
    device: auto
  nanodet:
    config: resources/models/nanodet/nanodet-plus-m_416.yml
    checkpoint: resources/models/nanodet/nanodet-plus-m_416_checkpoint.ckpt
    conf_threshold: 0.3
    device: auto
  mmdet:
    config: resources/models/mmdet/rtmdet/rtmdet_tiny_8xb32-300e_coco.py
    checkpoint: resources/models/mmdet/rtmdet_tiny_8xb32-300e_coco_20220902_112414-78e30dcc.pth
    conf_threshold: 0.3
    device: auto
  # Instance segmentation (person boxes + masks); usable as a detector and for
  # mask-based background removal before ReID (run_tracker.py --mask-background).
  yolo_seg:
    model: yolov8n-seg.pt
    conf_threshold: 0.3
    device: auto
  # Mask R-CNN (detectron2) — quality mode, slower than YOLO-seg.
  detectron2_seg:
    config: COCO-InstanceSegmentation/mask_rcnn_R_50_FPN_3x.yaml
    weights: null
    conf_threshold: 0.5
    device: auto
  # SMP semantic person seg + connected components (Cityscapes weights).
  smp_seg:
    arch: DeepLabV3Plus
    encoder: resnet50
    encoder_weights: imagenet
    classes: 19
    person_class: 11
    checkpoint: resources/models/smp/deeplabv3plus_cityscapes.pth
    conf_threshold: 0.5
    min_area: 400
    device: auto
